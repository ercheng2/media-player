name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller python-vlc PyQt5 pyserial PyMuPDF python-pptx pywin32 comtypes
    
    - name: Install VLC
      run: |
        choco install vlc -y --no-progress
    
    - name: Copy VLC DLLs to project
      run: |
        $vlcPath = "C:\Program Files\VideoLAN\VLC"
        $destVlc = "vlc"
        New-Item -ItemType Directory -Path $destVlc -Force
        $requiredFiles = @("libvlc.dll", "libvlccore.dll", "plugins")
        foreach ($f in $requiredFiles) {
          $src = Join-Path $vlcPath $f
          if (Test-Path $src) {
            Copy-Item -Path $src -Destination (Join-Path $destVlc $f) -Recurse -Force
            Write-Host "Copied: $f"
          }
        }
        Get-ChildItem -Path $destVlc -Recurse | Select-Object FullName
    
    - name: Build Player EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "media-player" --icon="Kunzhancheng.ico" --add-data "Kunzhancheng.ico;." --add-data "vlc;vlc" --hidden-import=vlc --hidden-import=serial --hidden-import=serial.tools.list_ports --hidden-import=fitz --hidden-import=pptx --hidden-import=win32com.client --hidden-import=pythoncom --hidden-import=comtypes.client main.py
    
    - name: Build Activation Tool EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "activation-tool" --hidden-import=PyQt5 activation_tool_gui.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "坤展成-中控多窗口播放器 ${{ github.ref_name }}"
        body: |
          v2.60 - 防篡改试用期+注册码激活码授权系统+激活工具
        files: dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
