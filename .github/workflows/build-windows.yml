name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller python-vlc PyQt5 pyserial
    
    - name: Install VLC via Chocolatey
      run: |
        choco install vlc -y --no-progress
    
    - name: Copy VLC files
      run: |
        $vlcPath = "C:\Program Files\VideoLAN\VLC"
        if (Test-Path $vlcPath) {
          Copy-Item -Path $vlcPath -Destination "vlc" -Recurse
          Write-Host "VLC copied successfully"
        } else {
          Write-Error "VLC not found at $vlcPath"
          exit 1
        }
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "media-player" --icon="Kunzhancheng.ico" --add-data "Kunzhancheng.ico;." --add-data "vlc;vlc" --hidden-import=vlc --hidden-import=serial --hidden-import=serial.tools.list_ports main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: media-player-windows
        path: dist/*.exe
        retention-days: 30
