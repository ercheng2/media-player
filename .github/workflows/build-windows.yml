name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller python-vlc PyQt5 pyserial
    
    - name: Install VLC
      run: |
        choco install vlc -y --no-progress
    
    - name: Copy VLC DLLs to project
      run: |
        $vlcPath = "C:\Program Files\VideoLAN\VLC"
        $destVlc = "vlc"
        New-Item -ItemType Directory -Path $destVlc -Force
        # 只复制必要的DLL，不复制整个VLC目录（减小体积）
        $requiredFiles = @("libvlc.dll", "libvlccore.dll", "plugins")
        foreach ($f in $requiredFiles) {
          $src = Join-Path $vlcPath $f
          if (Test-Path $src) {
            Copy-Item -Path $src -Destination (Join-Path $destVlc $f) -Recurse -Force
            Write-Host "Copied: $f"
          }
        }
        # 列出vlc目录内容
        Get-ChildItem -Path $destVlc -Recurse | Select-Object FullName
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "media-player" --icon="Kunzhancheng.ico" --add-data "Kunzhancheng.ico;." --add-data "vlc;vlc" --hidden-import=vlc --hidden-import=serial --hidden-import=serial.tools.list_ports main.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.40
        name: "坤展成-中控多窗口播放器 v2.40"
        body: |
          Windows版本 - VLC安全加载修复
          
          更新内容：
          - VLC DLL路径检测修复
          - 打包时内嵌VLC核心DLL
          - 支持NO_VLC=1环境变量强制禁用VLC
          - VLC加载失败自动回退QMediaPlayer
          - 修复Windows打开窗口崩溃问题
        files: dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
