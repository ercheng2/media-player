name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download VLC
      run: |
        Invoke-WebRequest -Uri "https://get.videolan.org/vlc/3.0.20/win64/vlc-3.0.20-win64.zip" -OutFile "vlc.zip"
        Expand-Archive -Path "vlc.zip" -DestinationPath "vlc"
        $vlcPath = (Get-ChildItem -Path "vlc" -Filter "vlc.exe" -Recurse).FullName
        $vlcDir = Split-Path $vlcPath -Parent
        echo "VLC_PATH=$vlcDir" >> $env:GITHUB_ENV
      shell: powershell
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "坤展成中控播放器" --add-data "vlc;vlc" --hidden-import "PyQt5" --hidden-import "vlc" --hidden-import "serial" --hidden-import "serial.tools" --hidden-import "serial.tools.list_ports" main.py
      shell: powershell
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: dist/坤展成中控播放器.exe
        retention-days: 30
