name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller python-vlc pyserial
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "media-player" --add-data "icon.png;." media_player.py
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        files: dist/media-player.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
