name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller python-vlc PyQt5 pyserial PyMuPDF python-pptx
    
    - name: Install VLC
      run: |
        choco install vlc -y --no-progress
    
    - name: Copy VLC DLLs to project
      run: |
        $vlcPath = "C:\Program Files\VideoLAN\VLC"
        $destVlc = "vlc"
        New-Item -ItemType Directory -Path $destVlc -Force
        $requiredFiles = @("libvlc.dll", "libvlccore.dll", "plugins")
        foreach ($f in $requiredFiles) {
          $src = Join-Path $vlcPath $f
          if (Test-Path $src) {
            Copy-Item -Path $src -Destination (Join-Path $destVlc $f) -Recurse -Force
            Write-Host "Copied: $f"
          }
        }
        Get-ChildItem -Path $destVlc -Recurse | Select-Object FullName
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "media-player" --icon="Kunzhancheng.ico" --add-data "Kunzhancheng.ico;." --add-data "vlc;vlc" --hidden-import=vlc --hidden-import=serial --hidden-import=serial.tools.list_ports --hidden-import=fitz --hidden-import=pptx main.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.41-fix-fix
        name: "坤展成-中控多窗口播放器 v2.41-fix"
        body: |
          Windows版本 - 图片PPT铺满 + PPT翻页支持
          
          更新内容：
          - 图片铺满窗口（无黑边）
          - PPT文件自动转图片播放
          - PPT每5秒自动翻页，循环播放
          - 支持左右方向键手动翻页
          - 视频铺满窗口
        files: dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
