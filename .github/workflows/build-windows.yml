name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install VLC
      run: |
        choco install vlc -y
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build EXE with VLC and Icon
      run: |
        $vlcPath = "C:\Program Files\VideoLAN\VLC"
        pyinstaller --onefile --windowed --name "media-player" --icon "Kunzhancheng.ico" `
          --add-binary "$vlcPath\libvlc.dll;vlc" `
          --add-binary "$vlcPath\libvlccore.dll;vlc" `
          --add-data "$vlcPath\plugins;vlc\plugins" `
          --add-data "Kunzhancheng.ico;." `
          main.py
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.15
        files: dist/media-player.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
